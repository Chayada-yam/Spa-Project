<h2>ประวัติการจอง</h2>

<table class="table" id="historyTable"></table>

<script>

fetch("/api/history")

.then(res=>res.json())

.then(data=>{

let html="<tr><th>Service</th><th>Date</th></tr>"

data.forEach(b=>{

html+=`
<tr>
<td>${b.service}</td>
<td>${b.booking_date}</td>
</tr>
`

})

document.getElementById("historyTable").innerHTML=html

})

</script>
