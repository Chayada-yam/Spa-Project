<h2>Admin Dashboard</h2>

<h3>ลูกค้า</h3>

<table class="table" id="users"></table>

<h3>การจอง</h3>

<table class="table" id="bookings"></table>

<script>

fetch("/api/users")
.then(res=>res.json())
.then(data=>{

let html="<tr><th>ID</th><th>Name</th><th>Phone</th></tr>"

data.forEach(u=>{

html+=`
<tr>
<td>${u.id}</td>
<td>${u.name}</td>
<td>${u.phone}</td>
</tr>
`

})

document.getElementById("users").innerHTML=html

})

fetch("/api/history")
.then(res=>res.json())
.then(data=>{

let html="<tr><th>Service</th><th>Date</th></tr>"

data.forEach(b=>{

html+=`
<tr>
<td>${b.service}</td>
<td>${b.booking_date}</td>
</tr>
`

})

document.getElementById("bookings").innerHTML=html

})

</script>
