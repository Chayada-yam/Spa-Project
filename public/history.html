<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>ประวัติการจอง</title>

<style>
    /* ธีมหลักของเว็บไซต์ */
    body {
        font-family: Arial, sans-serif;
        background: #f5f5f5;
        padding: 40px;
        margin: 0;
    }

    .container {
        width: 600px;
        margin: auto;
        background: white;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h2 {
        text-align: center;
        color: #333;
        margin-bottom: 25px;
    }

    .back {
        display: inline-block;
        margin-bottom: 15px;
        text-decoration: none;
        color: #555;
        font-weight: bold;
        transition: color 0.3s;
    }

    .back:hover { color: #8e44ad; }

    /* ดีไซน์การ์ดรายการจอง */
    .list-item {
        background: #fdfdfd;
        padding: 15px 20px;
        margin-bottom: 15px;
        border-radius: 8px;
        border: 1px solid #eee;
        display: flex;
        flex-direction: column;
        gap: 8px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        border-left: 5px solid #ccc; /* สีแถบด้านซ้ายค่าเริ่มต้น */
    }

    /* สีแถบด้านซ้ายตามสถานะ */
    .status-confirmed { border-left-color: #27ae60; } /* เขียว */
    .status-cancelled { border-left-color: #e74c3c; } /* แดง */
    .status-pending { border-left-color: #f39c12; }   /* ส้ม */

    .service-name {
        font-size: 18px;
        font-weight: bold;
        color: #8e44ad;
    }

    .service-datetime {
        color: #666;
        font-size: 15px;
    }

    /* ป้ายกำกับสถานะ (Badge) */
    .status-badge {
        font-weight: bold;
        padding: 4px 10px;
        border-radius: 15px;
        font-size: 13px;
        display: inline-block;
    }

    .badge-confirmed { background: #e8f8f5; color: #27ae60; }
    .badge-cancelled { background: #fdedec; color: #e74c3c; }
    .badge-pending { background: #fef5e7; color: #f39c12; }

    .empty-msg {
        text-align: center;
        color: #888;
        font-style: italic;
        margin-top: 30px;
    }
</style>

</head>

<body>

<div class="container">
    <a class="back" href="services.html">← กลับหน้าบริการ</a>
    
    <h2>🕒 ประวัติการจองของคุณ</h2>
    
    <div id="historyList">
        </div>
</div>

<script>
function loadHistory() {
    // ดึงข้อมูลการจองจาก localStorage
    const bookings = JSON.parse(localStorage.getItem("bookings")) || [];
    const historyList = document.getElementById("historyList");
    let html = "";

    if (bookings.length === 0) {
        html = "<div class='empty-msg'>คุณยังไม่มีประวัติการจองบริการ</div>";
    } else {
        // ให้รายการใหม่สุดขึ้นก่อน (ย้อนกลับ Array)
        const reversedBookings = [...bookings].reverse();
        
        reversedBookings.forEach(b => {
            // ตั้งค่าสีเริ่มต้นให้เป็น "รอการยืนยัน"
            let statusClass = "status-pending";
            let badgeClass = "badge-pending";
            let statusText = b.status || "รอการยืนยัน";
            
            // เปลี่ยนสีตามสถานะที่แอดมินกด
            if (statusText === "ยืนยันแล้ว") {
                statusClass = "status-confirmed";
                badgeClass = "badge-confirmed";
            } else if (statusText === "ยกเลิก") {
                statusClass = "status-cancelled";
                badgeClass = "badge-cancelled";
            }

            // จัดฟอร์แมตวันที่และเวลาให้ดูอ่านง่ายขึ้น (เปลี่ยน T เป็นเว้นวรรค)
            const dateStr = b.datetime.replace("T", " เวลา ");

            html += `
            <div class="list-item ${statusClass}">
                <div class="service-name">${b.service}</div>
                <div class="service-datetime">📅 วันที่: ${dateStr} น.</div>
                <div>สถานะ: <span class="status-badge ${badgeClass}">${statusText}</span></div>
            </div>
            `;
        });
    }
    historyList.innerHTML = html;
}

// โหลดประวัติทันทีที่เปิดหน้าเว็บ
window.onload = loadHistory;
</script>

</body>
</html>
