<link rel="stylesheet" href="css/style.css">

<div class="card">

<h2>สมัครสมาชิก</h2>

<form action="/register" method="POST" onsubmit="return checkPassword()">

<input name="name" placeholder="ชื่อ">

<select name="gender">

<option>ชาย</option>
<option>หญิง</option>

</select>

<input name="phone" placeholder="เบอร์โทร">

<input name="username" placeholder="username">

<input id="pass" type="password" name="password" placeholder="รหัสผ่าน 6 ตัว">

<input id="confirm" type="password" placeholder="ยืนยันรหัสผ่าน">

<small>กรอกรหัส 6 ตัว ตัวเลขเท่านั้น</small>

<button>สมัครสมาชิก</button>

</form>

</div>

<script src="js/register.js"></script>
