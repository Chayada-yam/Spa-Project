<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>สมัครสมาชิก</title>
<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="login-box">

<h2>สมัครสมาชิก</h2>

<input id="name" placeholder="ชื่อ">

<input id="username" placeholder="ชื่อผู้ใช้">

<input id="password" type="password" placeholder="รหัสผ่าน">

<p class="hint">
ต้องมีอักษรพิมพ์ใหญ่ 1 ตัว(รวม 8 ตัว)
</p>

<input id="confirm" type="password" placeholder="ยืนยันรหัสผ่าน">

<p id="error" class="error"></p>

<button onclick="register()">สมัครสมาชิก</button>

<a href="login.html">กลับไปหน้าเข้าสู่ระบบ</a>

</div>

<script src="js/register.js"></script>

</body>
</html>
