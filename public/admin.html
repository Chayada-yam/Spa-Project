<!DOCTYPE html>
<html>
<script>

const user=JSON.parse(localStorage.getItem("user"))

if(!user || user.role!=="admin"){

alert("เฉพาะแอดมินเท่านั้น")
window.location="login.html"

}

</script>
<head>

<meta charset="UTF-8">
<title>ผู้ดูแลระบบ</title>
<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container">

<h1>ระบบผู้ดูแลสปา</h1>
<h2>รายการจองทั้งหมด</h2>

<ul id="adminList"></ul>

<script>

const bookings=JSON.parse(localStorage.getItem("bookings")) || []

const list=document.getElementById("adminList")

bookings.forEach(b=>{
const li=document.createElement("li")
li.textContent=b.service+" - "+b.datetime
list.appendChild(li)
})

</script>
<h3>เพิ่มบริการ</h3>

<input id="serviceName" placeholder="ชื่อบริการ">

<input id="price" placeholder="ราคา">

<button onclick="addService()">เพิ่มบริการ</button>

<h3>รายการบริการ</h3>

<div id="serviceList"></div>

<button onclick="logout()">ออกจากระบบ</button>

</div>

<script src="js/admin.js"></script>

</body>
</html>
