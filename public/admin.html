<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Admin</title>
</head>

<body>

<h2>จัดการบริการ</h2>

<input type="text" id="serviceName" placeholder="ชื่อบริการ">
<button onclick="addService()">เพิ่มบริการ</button>

<h3>รายการบริการ</h3>

<div id="serviceList"></div>

<h3>การจองที่รอยืนยัน</h3>

<div id="bookingList"></div>

<script>

function loadServices(){

const services = JSON.parse(localStorage.getItem("services")) || []

let html=""

services.forEach((s,i)=>{

html+=`
<div>
${s}
<button onclick="deleteService(${i})">ลบ</button>
</div>
`

})

document.getElementById("serviceList").innerHTML=html

}

function addService(){

const name=document.getElementById("serviceName").value

let services = JSON.parse(localStorage.getItem("services")) || []

services.push(name)

localStorage.setItem("services",JSON.stringify(services))

loadServices()

}

function deleteService(i){

let services = JSON.parse(localStorage.getItem("services")) || []

services.splice(i,1)

localStorage.setItem("services",JSON.stringify(services))

loadServices()

}

function loadBookings(){

const bookings = JSON.parse(localStorage.getItem("bookings")) || []

let html=""

bookings.forEach((b,i)=>{

if(!b.status || b.status==="รอการยืนยัน"){

html+=`
<div>
${b.service} | ${b.datetime}

<button onclick="confirmBooking(${i})">ยืนยัน</button>
<button onclick="cancelBooking(${i})">ยกเลิก</button>

</div>
`

}

})

document.getElementById("bookingList").innerHTML=html

}

function confirmBooking(i){

let bookings = JSON.parse(localStorage.getItem("bookings")) || []

bookings[i].status="ยืนยันแล้ว"

localStorage.setItem("bookings",JSON.stringify(bookings))

loadBookings()

}

function cancelBooking(i){

let bookings = JSON.parse(localStorage.getItem("bookings")) || []

bookings[i].status="ยกเลิก"

localStorage.setItem("bookings",JSON.stringify(bookings))

loadBookings()

}

loadServices()
loadBookings()

</script>

</body>
</html>
