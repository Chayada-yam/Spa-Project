<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>ประวัติการจอง</title>
</head>

<body>

<h2>ประวัติการจอง</h2>

<ul id="historyList"></ul>

<script>

const list = document.getElementById("historyList")

let bookings = JSON.parse(localStorage.getItem("bookings"))

if(!bookings || bookings.length === 0){

list.innerHTML = "<li>ยังไม่มีการจอง</li>"

}else{

bookings.forEach(b=>{

const li=document.createElement("li")

li.textContent = b.service + " | " + b.datetime + " | สถานะ: " + (b.status || "รอการยืนยัน")

list.appendChild(li)

})

}

</script>

</body>
</html>
