<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>
<style>
    /* ธีมเดียวกับหน้า Booking */
    body {
        font-family: Arial, sans-serif;
        background: #f5f5f5;
        padding: 40px;
        margin: 0;
    }
    
    .container {
        width: 600px; 
        margin: auto;
        background: white;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
        margin-bottom: 20px;
    }

    h2, h3 { text-align: center; color: #333; }
    h3 { margin-top: 30px; border-bottom: 2px solid #eee; padding-bottom: 10px; }

    .input-group { display: flex; gap: 10px; margin-top: 15px; }
    input[type="text"] { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; }
    
    button { padding: 10px 15px; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 14px; transition: background 0.3s; }
    .btn-add { background: #8e44ad; font-size: 16px; }
    .btn-add:hover { background: #732d91; }
    .btn-delete { background: #e74c3c; }
    .btn-delete:hover { background: #c0392b; }
    .btn-confirm { background: #27ae60; }
    .btn-confirm:hover { background: #2ecc71; }
    .btn-cancel { background: #95a5a6; }
    .btn-cancel:hover { background: #7f8c8d; }
    .btn-logout { background: #e74c3c; font-weight: bold; margin-bottom: 15px; }
    .btn-logout:hover { background: #c0392b; }

    .list-item {
        background: #fdfdfd; padding: 15px; margin-top: 15px; border-radius: 8px;
        display: flex; justify-content: space-between; align-items: center;
        border-left: 5px solid #8e44ad; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        border-right: 1px solid #eee; border-top: 1px solid #eee; border-bottom: 1px solid #eee;
    }
    .info { display: flex; flex-direction: column; gap: 5px; color: #555; }
    .info strong { color: #222; }
    .action-buttons { display: flex; gap: 5px; }
    .empty-msg { text-align: center; color: #888; margin-top: 15px; font-style: italic; }
</style>
</head>

<body>

<div style="width: 660px; margin: auto; text-align: right;">
    <button class="btn-logout" onclick="logoutAdmin()">🚪 ออกจากระบบแอดมิน</button>
</div>

<div class="container">
    <h2>🛠️ จัดการบริการ (Admin)</h2>
    <div class="input-group">
        <input type="text" id="serviceName" placeholder="เพิ่มชื่อบริการใหม่ (เช่น นวดแผนไทย)">
        <button class="btn-add" onclick="addService()">+ เพิ่มบริการ</button>
    </div>
    <h3>📋 รายการบริการที่เปิดให้จอง</h3>
    <div id="serviceList"></div>
</div>

<div class="container">
    <h3>🔔 การจองที่รอยืนยัน</h3>
    <div id="bookingList"></div>
</div>

<script>
// 🔒 1. ระบบป้องกัน: เช็คตั้งแต่บรรทัดแรกว่าล็อกอินเป็นแอดมินหรือยัง
// ถ้าไม่มีสิทธิ์ จะเด้งไปหน้า login.html ทันทีและไม่ให้โหลดหน้าแอดมินต่อ
if (localStorage.getItem("isAdminLoggedIn") !== "true") {
    alert("คุณไม่มีสิทธิ์เข้าถึงหน้านี้ กรุณาเข้าสู่ระบบในฐานะแอดมิน!");
    window.location.replace("login.html"); 
}

// 🚪 2. ฟังก์ชันออกจากระบบแอดมิน
function logoutAdmin() {
    localStorage.removeItem("isAdminLoggedIn"); // ล้างสิทธิ์แอดมิน
    window.location.replace("login.html");
}

// ==============================================
// ฟังก์ชันจัดการระบบแอดมิน (ของเดิม)
// ==============================================
function loadServices(){
    const defaultServices = [
        "Thai Massage", "Facial Spa", "Aromatherapy",
        "Hot Stone Massage", "Body Scrub", "Foot Massage"
    ];

    let services = JSON.parse(localStorage.getItem("services"));
    if(!services || services.length === 0) {
        services = defaultServices;
        localStorage.setItem("services", JSON.stringify(services));
    }

    let html = "";
    services.forEach((s,i)=>{
        html += `
        <div class="list-item">
            <span style="font-size: 16px;"><strong>${s}</strong></span>
            <button class="btn-delete" onclick="deleteService(${i})">ลบ</button>
        </div>
        `;
    });
    document.getElementById("serviceList").innerHTML = html;
}

function addService(){
    const name = document.getElementById("serviceName").value.trim();
    if(name === "") { alert("กรุณากรอกชื่อบริการ"); return; }
    let services = JSON.parse(localStorage.getItem("services")) || [];
    services.push(name);
    localStorage.setItem("services", JSON.stringify(services));
    document.getElementById("serviceName").value = ""; 
    loadServices();
}

function deleteService(i){
    if(confirm("ต้องการลบบริการนี้ใช่หรือไม่?")) {
        let services = JSON.parse(localStorage.getItem("services")) || [];
        services.splice(i, 1);
        localStorage.setItem("services", JSON.stringify(services));
        loadServices();
    }
}

function loadBookings(){
    const bookings = JSON.parse(localStorage.getItem("bookings")) || [];
    let html = "";
    let hasPending = false;

    bookings.forEach((b,i)=>{
        if(!b.status || b.status === "รอการยืนยัน"){
            hasPending = true;
            html += `
            <div class="list-item" style="border-left-color: #f39c12;">
                <div class="info">
                    <span><strong>บริการ:</strong> ${b.service}</span>
                    <span><strong>วัน-เวลา:</strong> ${b.datetime.replace("T", " ")}</span>
                </div>
                <div class="action-buttons">
                    <button class="btn-confirm" onclick="confirmBooking(${i})">ยืนยัน</button>
                    <button class="btn-cancel" onclick="cancelBooking(${i})">ยกเลิก</button>
                </div>
            </div>
            `;
        }
    });

    if(!hasPending) { html = "<div class='empty-msg'>ไม่มีรายการจองใหม่ที่รอยืนยัน</div>"; }
    document.getElementById("bookingList").innerHTML = html;
}

function confirmBooking(i){
    let bookings = JSON.parse(localStorage.getItem("bookings")) || [];
    bookings[i].status = "ยืนยันแล้ว";
    localStorage.setItem("bookings", JSON.stringify(bookings));
    loadBookings();
}

function cancelBooking(i){
    if(confirm("ต้องการยกเลิกคิวนี้ใช่หรือไม่?")) {
        let bookings = JSON.parse(localStorage.getItem("bookings")) || [];
        bookings[i].status = "ยกเลิก";
        localStorage.setItem("bookings", JSON.stringify(bookings));
        loadBookings();
    }
}

// โหลดข้อมูล
loadServices();
loadBookings();
</script>

</body>
</html>
