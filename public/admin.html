<link rel="stylesheet" href="style.css">

<div class="container">

<h2>ประวัติการจอง</h2>

<ul id="list"></ul>

</div>

<script>

fetch("/api/history")
.then(r=>r.json())
.then(data=>{

let html=""

data.forEach(b=>{
html+=`<li>${b.service} - ${b.booking_time} - ${b.status}</li>`
})

document.getElementById("list").innerHTML=html

})

</script>
