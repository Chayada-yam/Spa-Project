<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>เข้าสู่ระบบ</title>
<style>
body{
    font-family: Arial;
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.box{
    background:white;
    padding:30px;
    width:350px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}
input{
    width:100%;
    padding:10px;
    margin:10px 0;
    box-sizing: border-box;
}
button{
    width:100%;
    padding:12px;
    background:#8e44ad;
    color:white;
    border:none;
    margin-top:10px;
    cursor:pointer;
    border-radius:5px;
}
button:hover {
    background:#732d91;
}
.btn-admin {
    background: #34495e;
}
.btn-admin:hover {
    background: #2c3e50;
}
</style>
</head>

<body>

<div class="box">
    <h2>เข้าสู่ระบบ</h2>

    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">เข้าสู่ระบบทั่วไป</button>
    <button class="btn-admin" onclick="goAdmin()">เข้าสู่ระบบแอดมิน</button>

    <p style="text-align: center; margin-top: 15px;">ยังไม่มีบัญชี? <a href="register.html">สมัครสมาชิก</a></p>
</div>

<script>
// ฟังก์ชันสำหรับเข้าสู่ระบบแอดมิน
function goAdmin(){
    const user = document.getElementById("username").value;
    const pass = document.getElementById("password").value;

    // เช็ครหัสแอดมิน (admin / 1234)
    if (user === "admin" && pass === "1234") {
        // *** บรรทัดนี้สำคัญมาก! คือการมอบกุญแจให้แอดมิน ***
        localStorage.setItem("isAdminLoggedIn", "true");
        
        alert("เข้าสู่ระบบแอดมินสำเร็จ!");
        window.location.href = "admin.html"; // ไปยังหน้าแอดมิน
    } else {
        alert("Username หรือ Password สำหรับแอดมินไม่ถูกต้อง!");
    }
}

// ฟังก์ชันสำหรับผู้ใช้ทั่วไป
function login(){
    const user = document.getElementById("username").value;
    const pass = document.getElementById("password").value;
    
    if (user !== "" && pass !== "") {
        // จำชื่อผู้ใช้ทั่วไป
        localStorage.setItem("user", user);
        alert("เข้าสู่ระบบสำเร็จ");
        window.location.href = "services.html"; // เปลี่ยนไปหน้าบริการของผู้ใช้
    } else {
        alert("กรุณากรอกข้อมูลให้ครบถ้วน");
    }
}
</script>

</body>
</html>
