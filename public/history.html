<link rel="stylesheet" href="/css/style.css">

<div class="container">

<h2>ประวัติการจอง</h2>

<table class="table">

<thead>
<tr>
<th>Service</th>
<th>Time</th>
<th>Status</th>
</tr>
</thead>

<tbody id="data"></tbody>

</table>

</div>

<script>

fetch("/api/history")
.then(res=>res.json())
.then(data=>{

let html=""

data.forEach(b=>{

html+=`
<tr>
<td>${b.name}</td>
<td>${b.booking_time}</td>
<td>${b.status}</td>
</tr>
`

})

document.getElementById("data").innerHTML=html

})

</script>
