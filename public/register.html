<!DOCTYPE html>
<html>
<head>
<title>Register</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">
<div class="card">

<h2>สมัครสมาชิก</h2>

<form action="/api/register" method="POST">

<input name="name" placeholder="ชื่อ">

<select name="gender">
<option>หญิง</option>
<option>ชาย</option>
</select>

<input name="phone" placeholder="เบอร์โทร">

<input name="address" placeholder="ที่อยู่">

<input name="username" placeholder="ชื่อผู้ใช้">

<input name="password" placeholder="รหัสผ่าน 6 ตัว">

<button>สมัครสมาชิก</button>

</form>

</div>
</div>

</body>
</html>
